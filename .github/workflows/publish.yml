name: Publish crates to crates.io

on:
  workflow_dispatch:
    inputs:
      ic-certified-assets:
        description: "Publish ic-certified-assets"
        type: boolean
        default: false

jobs:
  publish:
    name: Publish selected crates
    runs-on: ubuntu-24.04
    if: >-
      inputs.ic-certified-assets 

    permissions:
      contents: read
      id-token: write # Required for trusted publishing via OIDC

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4
        with:
          cache: false

      - name: Authenticate with crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@b7e9a28eded4986ec6b1fa40eeee8f8f165559ec # v1

      - name: Publish ic-certified-assets
        if: inputs.ic-certified-assets
        run: cargo publish -p ic-certified-assets
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
